<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autonomous Policy Timeline | Avi Perera</title>
    <meta name="description" content="An interactive timeline visualizing the history of AI regulation from its early beginnings to modern international law, curated by Avi Perera." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
      
      :root {
        --bg-color: #0b0f19;
        --card-bg: rgba(30, 41, 59, 0.6);
        --text-color: #f8fafc;
        --accent-glow: rgba(56, 189, 248, 0.4);
        --accent-solid: #38bdf8;
        --line-color: rgba(255, 255, 255, 0.1);
      }
      
      body, html {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      /* Hero section */
      
      .hero {
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 20px;
        position: relative;
        background: radial-gradient(circle at center, rgba(30, 41, 59, 0.8) 0%, var(--bg-color) 70%);
      }
      
      .hero h1 {
        font-size: 4rem;
        font-weight: 800;
        margin-bottom: 20px;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .hero p {
        font-size: 1.2rem;
        max-width: 600px;
        color: #94a3b8;
        line-height: 1.6;
      }
      
      .scroll-indicator {
        position: absolute;
        bottom: 50px;
        animation: bounce 2s infinite;
        opacity: 0.7;
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-20px); }
        60% { transform: translateY(-10px); }
      }
      
      /* Vertical Timeline Layout */
      
      .timeline-section {
        position: relative;
        width: 100%;
        padding: 100px 0;
        background-color: var(--bg-color);
      }
      
      .timeline-container {
        max-width: 1200px;
        margin: 0 auto;
        position: relative;
        padding: 0 20px;
      }
      
      /* The center line */
      
      .timeline-line {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 4px;
        background-color: var(--line-color);
        transform: translateX(-50%);
        border-radius: 2px;
      }
      
      /* The glowing progress line that fills up on scroll */
      
      .timeline-progress {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 0%;
        background: linear-gradient(to bottom, #38bdf8, #818cf8);
        border-radius: 2px;
        box-shadow: 0 0 15px var(--accent-glow);
      }
      
      /* Individual Event Row */
      
      .event-row {
        position: relative;
        width: 100%;
        display: flex;
        justify-content: flex-end;
        padding: 60px 0;
      }
      
      .event-row.left {
        justify-content: flex-start;
      }
      
      /* The dot on the center line */
      
      .event-node {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) scale(1);
        width: 20px;
        height: 20px;
        background-color: var(--bg-color);
        border: 4px solid #334155;
        border-radius: 50%;
        z-index: 2;
        transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      
      .event-node.active {
        background-color: var(--accent-solid);
        border-color: #fff;
        transform: translate(-50%, -50%) scale(1.4);
        box-shadow: 0 0 20px var(--accent-glow), 0 0 40px var(--accent-solid);
      }
      
      /* Ripple Effect */
      
      .event-node::after {
        content: '';
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        border-radius: 50%;
        background-color: var(--accent-solid);
        transform: translate(-50%, -50%) scale(1);
        opacity: 0;
        z-index: -1;
      }
      
      .event-node.active::after {
        animation: pulse-ripple 2s cubic-bezier(0.165, 0.84, 0.44, 1) infinite;
      }
      
      @keyframes pulse-ripple {
        0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        100% { transform: translate(-50%, -50%) scale(3.5); opacity: 0; }
      }
      
      /* Event Card */
      
      .event-card {
        width: 45%; /* Takes up just under half the screen */
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
        opacity: 0; /* Hidden initially for GSAP */
      }
      
      /* Layout shifts for right/left cards */
      
      .event-row.left .event-card {
        transform: translateX(-50px);
      }
      
      .event-row.right .event-card {
        transform: translateX(50px);
      }
      
      /* Year Badge */
      
      .event-year {
        display: inline-block;
        padding: 6px 12px;
        background: rgba(56, 189, 248, 0.15);
        color: #38bdf8;
        border-radius: 20px;
        font-weight: 800;
        font-size: 1.1rem;
        margin-bottom: 15px;
        border: 1px solid rgba(56, 189, 248, 0.3);
      }
      
      .event-category {
        float: right;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #94a3b8;
        margin-top: 10px;
      }
      
      .event-title {
        font-size: 1.6rem;
        font-weight: 600;
        margin: 0 0 15px 0;
        line-height: 1.3;
      }
      
      .event-description {
        font-size: 1rem;
        color: #cbd5e1;
        line-height: 1.6;
        margin: 0;
      }
      
      /* Footer */
      
      .footer {
        padding: 60px 20px;
        text-align: center;
        background-color: #05080f;
        border-top: 1px solid rgba(255,255,255,0.05);
      }
      
      .footer p {
        color: #64748b;
        font-size: 0.9rem;
      }
      
      .footer a {
        color: #38bdf8;
        text-decoration: none;
      }
      
      /* Mobile Layout */
      
      @media (max-width: 768px) {
        .hero h1 { font-size: 2.5rem; }
        
        .timeline-line {
          left: 30px; /* Move line to left edge */
        }
        
        .event-node {
          left: 30px;
        }

        .event-row.left, .event-row.right {
          justify-content: flex-end;
          padding: 30px 0;
        }
        
        .event-card {
          width: calc(100% - 70px); /* Fill space minus the line gap */
        }
        
        .event-row.left .event-card, .event-row.right .event-card {
          transform: translateX(20px); /* Slide in from right for all on mobile */
        }
      }
    </style>
    <script type="module" crossorigin src="/ai-policy-timeline/assets/index-yXN1FKbe.js"></script>
  </head>
  <body>
    <div class="app-container">
      
      <section class="hero">
        <h1>Autonomous Policy Timeline</h1>
        <p>A chronological journey through the history of Artificial Intelligence regulation, treaties, and international law.</p>
        <div class="scroll-indicator">Scroll to Explore</div>
      </section>

      <section class="timeline-section">
        <div class="timeline-container">
          <!-- Center vertical line -->
          <div class="timeline-line">
            <div class="timeline-progress" id="timeline-progress"></div>
          </div>
          
          <!-- Rows will be injected here -->
          <div id="events-wrapper"></div>
        </div>
      </section>
      
      <section class="footer">
        <p>Curated by <a href="https://aviperera.com" target="_blank">Avi Perera</a> &copy; 2026. Built for transparency in Sovereign Algorithms and Autonomous Weapons Policy.</p>
      </section>

    </div>
    
    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </body>
</html>
