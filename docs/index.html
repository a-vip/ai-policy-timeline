<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Autonomous Policy Timeline | Avi Perera</title>
    <meta name="description" content="An interactive 3D timeline visualizing the history of AI regulation from its early beginnings to modern international law, curated by Avi Perera." />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
      
      :root {
        --bg-color: #0b0f19;
        --card-bg: rgba(30, 41, 59, 0.6);
        --text-color: #f8fafc;
        --accent-glow: rgba(56, 189, 248, 0.4);
        --line-color: #334155;
      }
      
      body, html {
        margin: 0;
        padding: 0;
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: 'Inter', sans-serif;
        overflow-x: hidden;
      }
      
      /* Base layout */
      
      .app-container {
        position: relative;
        width: 100%;
      }
      
      /* Hero section */
      
      .hero {
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        text-align: center;
        padding: 0 20px;
        position: relative;
        z-index: 10;
        background: radial-gradient(circle at center, rgba(30, 41, 59, 0.8) 0%, var(--bg-color) 70%);
      }
      
      .hero h1 {
        font-size: 4rem;
        font-weight: 800;
        margin-bottom: 20px;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      
      .hero p {
        font-size: 1.2rem;
        max-width: 600px;
        color: #94a3b8;
        line-height: 1.6;
      }
      
      .scroll-indicator {
        position: absolute;
        bottom: 50px;
        animation: bounce 2s infinite;
        opacity: 0.7;
        font-size: 0.9rem;
        letter-spacing: 2px;
        text-transform: uppercase;
      }
      
      @keyframes bounce {
        0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
        40% { transform: translateY(-20px); }
        60% { transform: translateY(-10px); }
      }
      
      /* 3D Timeline Section */
      
      .timeline-container {
        position: relative;
        width: 100%;
        /* The container needs a lot of height so we can scroll through the items */
        height: 500vh; 
      }
      
      .timeline-scene {
        position: sticky;
        top: 0;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        perspective: 1000px;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      /* The central glowing axis */
      
      .timeline-axis {
        position: absolute;
        width: 2px;
        height: 200vw; /* Extend deep into Z space */
        background: linear-gradient(to bottom, transparent, var(--accent-glow), transparent);
        box-shadow: 0 0 15px var(--accent-glow);
        transform: rotateX(90deg) translateZ(-100px);
        transform-origin: center;
      }
      
      /* Event Cards */
      
      .event-card {
        position: absolute;
        width: 400px;
        padding: 30px;
        background: var(--card-bg);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
        transform-style: preserve-3d;
        opacity: 0; /* Hidden initially, controlled by GSAP */
        /* Center in the viewport */
        left: 50%;
        top: 50%;
        margin-left: -200px; /* half of width */
        margin-top: -150px; /* approx half of height */
      }
      
      /* Year Badge */
      
      .event-year {
        display: inline-block;
        padding: 6px 12px;
        background: rgba(56, 189, 248, 0.2);
        color: #38bdf8;
        border-radius: 20px;
        font-weight: 800;
        font-size: 1.1rem;
        margin-bottom: 15px;
        border: 1px solid rgba(56, 189, 248, 0.3);
      }
      
      .event-category {
        float: right;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: #94a3b8;
        margin-top: 10px;
      }
      
      .event-title {
        font-size: 1.8rem;
        font-weight: 600;
        margin: 0 0 15px 0;
        line-height: 1.3;
      }
      
      .event-description {
        font-size: 1rem;
        color: #cbd5e1;
        line-height: 1.6;
        margin: 0;
      }
      
      /* Footer */
      
      .footer {
        padding: 60px 20px;
        text-align: center;
        background-color: #05080f;
        border-top: 1px solid rgba(255,255,255,0.05);
      }
      
      .footer p {
        color: #64748b;
        font-size: 0.9rem;
      }
      
      .footer a {
        color: #38bdf8;
        text-decoration: none;
      }
      
      @media (max-width: 768px) {
        .hero h1 { font-size: 2.5rem; }
        .event-card { 
          width: 300px; 
          margin-left: -150px;
        }
      }
    </style>
    <script type="module" crossorigin src="/ai-policy-timeline/assets/index-CA2koTtg.js"></script>
  </head>
  <body>
    <div class="app-container">
      
      <section class="hero">
        <h1>Autonomous Policy Timeline</h1>
        <p>A chronological journey through the history of Artificial Intelligence regulation, treaties, and international law.</p>
        <div class="scroll-indicator">Scroll to Explore</div>
      </section>

      <section class="timeline-container">
        <div class="timeline-scene">
          <div class="timeline-axis"></div>
          <div id="events-wrapper">
            <!-- Cards will be injected here by JS -->
          </div>
        </div>
      </section>
      
      <section class="footer">
        <p>Curated by <a href="https://aviperera.com" target="_blank">Avi Perera</a> &copy; 2026. Built for transparency in Sovereign Algorithms and Autonomous Weapons Policy.</p>
      </section>

    </div>
    
    <!-- GSAP Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  </body>
</html>
